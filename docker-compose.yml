services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: zad-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zad-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=(localdb)\\mssqllocaldb;Database=ZadDb;Trusted_Connection=True;MultipleActiveResultSets=true;TrustServerCertificate=True;"
      Jwt__Secret: "ChangeThisSecretKeyForDevOnly123456"
      SEED_ADMIN_EMAIL: "admin@zad.local"
      SEED_ADMIN_PASSWORD: "ChangeMe123!"
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver

volumes:
  sqlserver-data:
